<!DOCTYPE html><html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | a.rehman</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <script>
    // Theme initialization (Prevents flash of white)
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="{{ page.dir | default: 'ltr' }}">

  <aside class="sidebar">
    <div class="sidebar-icons">
      <a href="{{ '/' | relative_url }}" title="Home"><i data-lucide="home"></i></a>
      <a href="{{ '/perspective/' | relative_url }}" title="Perspective"><i data-lucide="book-open"></i></a>
      <a href="{{ '/poetry/' | relative_url }}" title="Poetry"><i data-lucide="feather"></i></a>
      <a href="{{ '/collections/' | relative_url }}" title="Collections"><i data-lucide="layers"></i></a>
      <a href="{{ '/portfolio/' | relative_url }}" title="Portfolio"><i data-lucide="briefcase"></i></a>
      <a href="{{ '/about/' | relative_url }}" title="About"><i data-lucide="user"></i></a>
      
      <button id="theme-toggle" class="nav-btn" title="Toggle Theme">
        <i data-lucide="moon" class="moon-icon"></i>
        <i data-lucide="sun" class="sun-icon"></i>
      </button>
    </div>
  </aside>

  <div class="main-viewport">
    <header class="top-bar-container">
      <nav class="glass-top-bar">
        <a href="/" class="brand-logo">a.rehman</a>
        <div class="top-links">
            <!-- <a href="{{ '/' | relative_url }}" class="brand-logo">a.rehman</a>
            <a href="{{ '/collections/' | relative_url }}">Collections</a> -->
            
            <a href="{{ '/perspective/' | relative_url }}" class="top-link">perspective</a>
            <a href="{{ '/portfolio/' | relative_url }}" class="top-link">portfolio</a>
            <a href="{{ '/about/' | relative_url }}" class="top-link">about</a>
        </div>
      </nav>
    </header>

    <main class="wrapper">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 — a digital window to my life. handcrafted with perfectionism.</p>
    </footer>
    </footer>
  </div>

  <script>
    lucide.createIcons();

    // Theme Toggle Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    themeToggleBtn.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Content Animation
    document.addEventListener("DOMContentLoaded", () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
          if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add('is-visible'), index * 100);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.content-card, .photo-card').forEach(el => {
        el.classList.add('has-animation');
        observer.observe(el);
      });
    });
  </script>
</body>
</html>
